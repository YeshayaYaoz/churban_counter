workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.arielapps.churbanCounter" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.arielapps.churbanCounter.ChurbanWidget" --type IOS_APP_STORE --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up signing
        script: xcode-project use-profiles
      - name: Build
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true